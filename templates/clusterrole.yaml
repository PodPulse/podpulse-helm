apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: podpulse-agent
  labels:
    {{- include "podpulse-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - nodes
      - namespaces
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["get", "list", "watch"]